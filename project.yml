name: Airlift
options:
  bundleIdPrefix: com.santekotturi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Credentials & team ID come from Config.xcconfig (gitignored).
# Copy Config.example.xcconfig -> Config.xcconfig before generating.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Airlift:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.santekotturi.airlift
        INFOPLIST_FILE: Sources/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
    entitlements:
      path: Sources/Resources/Airlift.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        # iCloud Documents so debug dumps sync to the user's Mac via iCloud
        # Drive. $(CFBundleIdentifier) keeps it valid for BYO bundle IDs.
        com.apple.developer.icloud-services: [CloudDocuments]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.$(CFBundleIdentifier)
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.$(CFBundleIdentifier)

  AirliftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Airlift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.santekotturi.airlift.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Airlift:
    build:
      targets:
        Airlift: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AirliftTests
