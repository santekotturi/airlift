name: Airlift
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Credentials & team ID come from Config.xcconfig (gitignored).
# Copy Config.example.xcconfig -> Config.xcconfig before generating.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Airlift:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        # The bundle ID comes from Config.xcconfig (AIRLIFT_BUNDLE_ID) — it
        # must match the bundle ID registered on your Google iOS OAuth client.
        PRODUCT_BUNDLE_IDENTIFIER: $(AIRLIFT_BUNDLE_ID)
        INFOPLIST_FILE: Sources/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
    # HealthKit only — no iCloud or other capabilities, so the app can be
    # signed with a free personal team.
    entitlements:
      path: Sources/Resources/Airlift.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  AirliftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Airlift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(AIRLIFT_BUNDLE_ID).tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Airlift:
    build:
      targets:
        Airlift: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AirliftTests
