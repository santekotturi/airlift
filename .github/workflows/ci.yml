name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Airlift uses iOS 26 APIs (Liquid Glass `glassEffect`) behind
      # `if #available` guards. Even guarded, they must be *compiled* against
      # the iOS 26 SDK, so pin Xcode 26 explicitly rather than trust the
      # image default.
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: |
          cp Config.example.xcconfig Config.xcconfig
          xcodegen generate

      - name: Run unit tests
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E "iPhone [0-9]+" | head -1 | sed -E 's/^ *([^(]+) \(.*/\1/' | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test -project Airlift.xcodeproj -scheme Airlift \
            -destination "platform=iOS Simulator,name=$DEVICE"
