<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AirKit — Variation C · Daybreak Bridge</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #fdf3e7;
    --sky-mid: #f7e3e0;
    --sky-low: #e8e6f7;
    --card: #ffffff;
    --ink: #2a2440;
    --mid: #75708c;
    --faint: #aaa6bd;
    --line: #ece9f4;
    --sun: #ff9d5c;
    --sun-deep: #f4753a;
    --plum: #6c5ce0;
    --ok: #2fa56f;
    --warn: #d98a1c;
    --awake: #ffb066;
    --rem: #a88cf5;
    --core: #5fc6d8;
    --deep: #5f74e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(170deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-low) 100%);
    font-family: 'Figtree', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 56px 48px 80px;
  }
  .masthead { max-width: 1480px; margin: 0 auto 44px; display: flex; align-items: baseline; gap: 24px; }
  .masthead h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: -.02em; }
  .masthead h1 span { color: var(--sun-deep); }
  .masthead .tag { font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: var(--mid); }
  .stage { max-width: 1480px; margin: 0 auto; display: flex; gap: 56px; justify-content: center; align-items: flex-start; }
  .slot { display: flex; flex-direction: column; gap: 18px; align-items: center; }
  .slot-label { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--mid); }

  .phone {
    width: 393px; height: 852px; border-radius: 54px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, #fff7ed 0%, #f6f1fb 70%, #efedfa 100%);
    box-shadow: 0 0 0 10px #211c33, 0 0 0 11.5px #4d4569, 0 36px 70px -20px rgba(63,48,107,.4);
  }
  .island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 118px; height: 34px; background: #16121f; border-radius: 20px; z-index: 50; }
  .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 58px; display: flex; justify-content: space-between; align-items: center; padding: 14px 32px 0; font-size: 14.5px; font-weight: 600; z-index: 40; }
  .screen { position: absolute; inset: 0; overflow-y: auto; padding: 70px 22px 36px; scrollbar-width: none; }
  .screen::-webkit-scrollbar { display: none; }

  .big-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -.02em; margin: 8px 2px 2px; }
  .sub { font-size: 14px; color: var(--mid); margin: 4px 2px 18px; line-height: 1.45; }

  .card { background: var(--card); border-radius: 26px; padding: 20px; margin-bottom: 14px; box-shadow: 0 10px 30px -14px rgba(63,48,107,.18); }
  .seclabel { font-size: 11.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--faint); font-weight: 600; margin: 20px 6px 10px; }

  /* bridge */
  .bridge { position: relative; padding: 8px 6px 2px; }
  .bridge-ends { display: flex; justify-content: space-between; align-items: center; }
  .endpoint { display: flex; flex-direction: column; align-items: center; gap: 7px; width: 84px; }
  .endpoint .logo { width: 56px; height: 56px; border-radius: 19px; display: flex; align-items: center; justify-content: center; font-size: 25px; font-weight: 700; box-shadow: 0 8px 20px -8px rgba(63,48,107,.35); }
  .endpoint small { font-size: 11px; color: var(--mid); font-weight: 600; }
  .arc { position: absolute; top: 14px; left: 92px; right: 92px; height: 44px; }
  .dotflow { animation: flow 2.6s linear infinite; }
  @keyframes flow { to { offset-distance: 100%; } }

  .count-banner { text-align: center; margin: 14px 0 4px; }
  .count-banner .n { font-family: 'Bricolage Grotesque', sans-serif; font-size: 46px; font-weight: 750; letter-spacing: -.03em; line-height: 1; }
  .count-banner .n em { font-style: normal; color: var(--sun-deep); }
  .count-banner p { font-size: 13.5px; color: var(--mid); margin-top: 6px; }

  .bigbtn {
    width: 100%; border: 0; border-radius: 20px; padding: 17px; font-family: 'Figtree'; font-size: 16.5px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, var(--sun) 0%, var(--sun-deep) 100%); color: #fff;
    box-shadow: 0 14px 30px -10px rgba(244,117,58,.55);
  }
  .ghostbtn { width: 100%; border: 0; background: rgba(108,92,224,.08); color: var(--plum); border-radius: 20px; padding: 14px; font-size: 15px; font-weight: 600; margin-top: 10px; font-family: 'Figtree'; cursor: pointer; }

  .chip { font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 99px; }
  .chip.ok { background: #e3f5ec; color: var(--ok); }
  .chip.warn { background: #fbf0dc; color: var(--warn); }
  .chip.new { background: #ede9ff; color: var(--plum); }

  .nightrow { display: flex; align-items: center; gap: 13px; padding: 13px 2px; border-bottom: 1px solid var(--line); }
  .nightrow:last-child { border-bottom: 0; }
  .daybadge { width: 46px; height: 46px; border-radius: 16px; background: linear-gradient(160deg,#f4f1ff,#e7e2fb); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .daybadge b { font-family:'Bricolage Grotesque'; font-size: 17px; line-height: 1; }
  .daybadge small { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--mid); }
  .nightrow .t { font-size: 14.5px; font-weight: 600; display:flex; gap:8px; align-items:center; }
  .nightrow .m { font-size: 12.5px; color: var(--mid); margin-top: 2px; }
  .nr-body { flex: 1; min-width: 0; }
  .chev { color: var(--faint); font-size: 20px; }

  .strip { display: flex; height: 8px; border-radius: 5px; overflow: hidden; margin-top: 8px; }

  .meter { background: #f3f0fb; border-radius: 99px; height: 9px; overflow: hidden; margin-top: 7px; }
  .meter div { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#8ad6b4,var(--ok)); }

  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mini { background: var(--card); border-radius: 20px; padding: 14px; box-shadow: 0 10px 30px -14px rgba(63,48,107,.15); }
  .mini .ic { font-size: 17px; }
  .mini .v { font-family: 'Bricolage Grotesque'; font-size: 22px; font-weight: 700; margin-top: 6px; }
  .mini .k { font-size: 11.5px; color: var(--mid); margin-top: 2px; }

  .legend { display: flex; gap: 13px; margin-top: 10px; flex-wrap: wrap; }
  .legend span { font-size: 11px; color: var(--mid); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  .checkrow { display: flex; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; align-items: flex-start; }
  .checkrow:last-child { border-bottom: 0; }
  .checkrow .ic { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; font-weight: 800; }
  .checkrow small { display: block; color: var(--mid); font-size: 12px; margin-top: 2px; }

  .apinote { display: flex; gap: 12px; background: linear-gradient(135deg,#fff8ec,#fdeede); border-radius: 22px; padding: 16px; margin-top: 16px; align-items: flex-start; }
  .apinote .sunico { width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #ffd29a, var(--sun-deep)); flex-shrink: 0; box-shadow: 0 0 18px rgba(255,157,92,.6); }
  .apinote p { font-size: 12.5px; line-height: 1.55; color: #7c5a33; }
  .apinote b { color: #b3622a; }

  .tl { position: relative; padding-left: 26px; }
  .tl::before { content:""; position: absolute; left: 8px; top: 8px; bottom: 8px; width: 2px; background: var(--line); border-radius: 2px; }
  .tl-item { position: relative; padding: 10px 0; }
  .tl-item::before { content:""; position: absolute; left: -23px; top: 16px; width: 9px; height: 9px; border-radius: 50%; background: var(--plum); box-shadow: 0 0 0 3px #efe9ff; }
  .tl-item.sun::before { background: var(--sun-deep); box-shadow: 0 0 0 3px #ffe9d8; }
  .tl-item.ok::before { background: var(--ok); box-shadow: 0 0 0 3px #def3e9; }
  .tl-item b { font-size: 14px; }
  .tl-item p { font-size: 12.5px; color: var(--mid); margin-top: 2px; line-height: 1.5; }
  .tl-item .when { font-size: 11px; color: var(--faint); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const GOOGLE_SEGS = [
  ["awake",0,8],["core",8,40],["deep",40,95],["core",95,120],["rem",120,155],
  ["core",155,210],["deep",210,250],["core",250,265],["awake",265,274],
  ["core",274,310],["rem",310,360],["core",360,400],["rem",400,430],["core",430,436],["awake",436,444]
];
const APPLE_SEGS = [
  ["awake",4,14],["core",14,52],["deep",52,90],["core",90,126],["rem",126,150],
  ["core",150,214],["deep",214,246],["core",246,268],["awake",268,280],
  ["core",280,316],["rem",316,352],["core",352,398],["rem",398,426],["core",426,440]
];
const C = { awake:"var(--awake)", rem:"var(--rem)", core:"var(--core)", deep:"var(--deep)" };
const TOTAL = 444;

function Strip({segs,height=8}) {
  return <div className="strip" style={{height}}>
    {segs.map(([st,a,b],i)=><div key={i} style={{width:`${(b-a)/TOTAL*100}%`,background:C[st]}}/>)}
  </div>;
}

function Bridge() {
  return <div className="bridge">
    <svg className="arc" viewBox="0 0 200 44" preserveAspectRatio="none">
      <path id="arcpath" d="M4 40 Q 100 -18 196 40" fill="none" stroke="#d9d2f0" strokeWidth="2.5" strokeDasharray="1 7" strokeLinecap="round"/>
      {[0,1,2].map(i=>
        <circle key={i} r="3.4" fill="var(--sun-deep)" className="dotflow"
          style={{offsetPath:"path('M4 40 Q 100 -18 196 40')", animationDelay:`${i*0.85}s`}}/>)}
    </svg>
    <div className="bridge-ends">
      <div className="endpoint">
        <div className="logo" style={{background:"#fff",color:"#4285F4",fontFamily:"Bricolage Grotesque"}}>G</div>
        <small>Fitbit Air</small>
      </div>
      <div className="endpoint">
        <div className="logo" style={{background:"linear-gradient(160deg,#ff7d94,#fb4d67)",color:"#fff"}}>♥</div>
        <small>Apple Health</small>
      </div>
    </div>
  </div>;
}

function Phone({children}) {
  return <div className="phone">
    <div className="island"/>
    <div className="statusbar"><span>9:41</span><span style={{letterSpacing:2}}>●●● ⌁ ▮</span></div>
    <div className="screen">{children}</div>
  </div>;
}

/* ---------- Screen 1: home ---------- */
function Home() {
  return <Phone>
    <div className="big-title">Good morning ☀️</div>
    <div className="sub">Last night came over the bridge at 6:42 AM.</div>

    <div className="card">
      <Bridge/>
      <div className="count-banner">
        <div className="n"><em>1 night</em> + 427 points</div>
        <p>fetched & checked — waiting for your OK.<br/>Nothing is written until you approve it.</p>
      </div>
      <button className="bigbtn">Review last night →</button>
      <button className="ghostbtn">Fetch again · last 7 days</button>
    </div>

    <div className="seclabel">Ready for review</div>
    <div className="card" style={{padding:"6px 18px"}}>
      <div className="nightrow">
        <div className="daybadge"><b>12</b><small>Thu</small></div>
        <div className="nr-body">
          <div className="t">7 h 24 m sleep <span className="chip ok">✓ checks pass</span></div>
          <div className="m">11:38 PM – 7:02 AM · agrees with Apple Watch 92%</div>
          <Strip segs={GOOGLE_SEGS}/>
        </div>
        <span className="chev">›</span>
      </div>
      <div className="nightrow">
        <div className="daybadge"><b>♥</b><small>3 types</small></div>
        <div className="nr-body">
          <div className="t">Overnight vitals <span className="chip new">new to Apple</span></div>
          <div className="m">Heart rate · HRV · SpO₂ — 427 points for Jun 12</div>
        </div>
        <span className="chev">›</span>
      </div>
    </div>

    <div className="seclabel">Recent crossings</div>
    <div className="card" style={{padding:"6px 18px"}}>
      {[["11","Wed","6 h 56 m imported","7:02 AM · 13 stages + vitals"],
        ["10","Tue","Nothing new","Fetched 6:40 AM — Google had no new sleep"],
        ["9","Mon","Tossed by you","Failed the duration check — never written"]].map(([n,d,t,m])=>
        <div className="nightrow" key={n}>
          <div className="daybadge"><b>{n}</b><small>{d}</small></div>
          <div className="nr-body"><div className="t">{t}</div><div className="m">{m}</div></div>
          <span className="chev">›</span>
        </div>)}
    </div>

    <div className="apinote">
      <div className="sunico"/>
      <p><b>Heads up:</b> Google’s Health API is still pre-release. Until it’s final (Sept 2026), fields can change — that’s exactly why AirKit shows you every night before it lands in Apple Health.</p>
    </div>
  </Phone>;
}

/* ---------- Screen 2: review ---------- */
function Review() {
  return <Phone>
    <div className="sub" style={{marginBottom:0}}>‹ Back</div>
    <div className="big-title" style={{fontSize:27}}>Last night, side by side</div>
    <div className="sub">Fitbit Air’s reading vs. what’s already in Apple Health.</div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:700,color:"var(--mid)"}}>
        <span>FITBIT AIR · 7 h 24 m</span><span className="chip new" style={{fontSize:10}}>importing</span>
      </div>
      <Strip segs={GOOGLE_SEGS} height={14}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:700,color:"var(--mid)",marginTop:16}}>
        <span>APPLE WATCH · 7 h 13 m</span><span style={{color:"var(--faint)",fontSize:10,fontWeight:600}}>ALREADY IN HEALTH</span>
      </div>
      <Strip segs={APPLE_SEGS} height={14}/>
      <div className="legend">
        <span><i style={{background:C.awake}}/>Awake</span>
        <span><i style={{background:C.rem}}/>REM</span>
        <span><i style={{background:C.core}}/>Light</span>
        <span><i style={{background:C.deep}}/>Deep</span>
      </div>
      <div style={{marginTop:14,fontSize:13,color:"var(--mid)"}}>Agreement with Apple Watch</div>
      <div className="meter"><div style={{width:"92%"}}/></div>
      <div style={{fontSize:12.5,color:"var(--ok)",fontWeight:700,marginTop:5}}>92% — the two trackers tell the same story</div>
    </div>

    <div className="duo">
      {[["🌙","1 h 32 m","Deep · +8 m vs Apple"],["💜","1 h 55 m","REM · +22 m vs Apple"],
        ["💧","96.4%","SpO₂ average"],["♥","58 bpm","resting overnight"]].map(([ic,v,k])=>
        <div className="mini" key={k}><span className="ic">{ic}</span><div className="v">{v}</div><div className="k">{k}</div></div>)}
    </div>

    <div className="seclabel">Before it lands</div>
    <div className="card">
      {[["ok","Times line up","Fell asleep & woke within minutes of Apple Watch"],
        ["ok","Adds up cleanly","15 segments, no gaps or overlaps"],
        ["ok","No duplicates possible","This night is keyed — re-syncs are skipped"],
        ["warn","REM runs 22 m higher","Sensors disagree here sometimes — your call"]].map(([s,t,m])=>
        <div className="checkrow" key={t}>
          <div className="ic" style={s==="ok"?{background:"#e3f5ec",color:"var(--ok)"}:{background:"#fbf0dc",color:"var(--warn)"}}>{s==="ok"?"✓":"!"}</div>
          <div><b>{t}</b><small>{m}</small></div>
        </div>)}
    </div>

    <button className="bigbtn">Looks right — add to Apple Health</button>
    <button className="ghostbtn">Skip this night</button>
  </Phone>;
}

/* ---------- Screen 3: history ---------- */
function History() {
  return <Phone>
    <div className="big-title" style={{fontSize:27}}>What crossed over</div>
    <div className="sub">A plain-language record of every sync.</div>

    <div className="duo" style={{marginBottom:14}}>
      {[["🌉","26","nights bridged"],["🛡","2","held back by checks"],
        ["♻️","84","duplicates blocked"],["🔒","0","bytes off-device"]].map(([ic,v,k])=>
        <div className="mini" key={k}><span className="ic">{ic}</span><div className="v">{v}</div><div className="k">{k}</div></div>)}
    </div>

    <div className="card">
      <div className="tl">
        <div className="tl-item sun">
          <div className="when">Today · 6:45 AM</div>
          <b>Last night landed in Apple Health</b>
          <p>7 h 24 m, 15 stage samples, plus heart rate, HRV and SpO₂ — all approved by you.</p>
        </div>
        <div className="tl-item">
          <div className="when">Today · 6:42 AM</div>
          <b>Morning fetch finished</b>
          <p>Pulled Jun 10–12 from Google. Found 1 new night; skipped 1 already imported.</p>
        </div>
        <div className="tl-item ok">
          <div className="when">Wed · 7:02 AM</div>
          <b>Tuesday night landed</b>
          <p>6 h 56 m with 13 stages. Apple Watch agreed within 4 minutes.</p>
        </div>
        <div className="tl-item">
          <div className="when">Tue · 6:40 AM</div>
          <b>Checked — nothing new</b>
          <p>Google had no new sleep yet. AirKit will retry on next launch.</p>
        </div>
        <div className="tl-item sun">
          <div className="when">Mon · 8:15 AM</div>
          <b>You skipped Sunday night</b>
          <p>Google reported 11.2 h, outside your normal range. Nothing was written.</p>
        </div>
        <div className="tl-item">
          <div className="when">Jun 8 · 9:03 PM</div>
          <b>Google connection renewed</b>
          <p>Your weekly sign-in refresh (a Google testing-mode rule, not an AirKit one).</p>
        </div>
      </div>
    </div>

    <div className="apinote">
      <div className="sunico"/>
      <p><b>If Google changes the API</b>, affected nights show up here as “held for review” instead of being written quietly. You’ll always know which version of the data is in Apple Health.</p>
    </div>
  </Phone>;
}

function App() {
  return <>
    <div className="masthead">
      <h1>AirKit <span>— Daybreak Bridge</span></h1>
      <span className="tag">Variation C · warm & plain-language · light</span>
    </div>
    <div className="stage">
      <div className="slot"><Home/><div className="slot-label">Morning home</div></div>
      <div className="slot"><Review/><div className="slot-label">Side-by-side review</div></div>
      <div className="slot"><History/><div className="slot-label">Plain-language history</div></div>
    </div>
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
