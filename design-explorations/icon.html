<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 1024px; height: 1024px; overflow: hidden; }
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFF6E6"/>
      <stop offset="42%" stop-color="#FBE2D8"/>
      <stop offset="100%" stop-color="#D3CDF2"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0%"  stop-color="#FFE2AC"/>
      <stop offset="45%" stop-color="#FFAA60"/>
      <stop offset="100%" stop-color="#F26E33"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFB066" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFB066" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#E4DFF8" stop-opacity="0"/>
      <stop offset="55%" stop-color="#DCD6F5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D3CDF2"/>
    </linearGradient>
  </defs>

  <!-- dawn sky -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- crescent moon, fading out top-left -->
  <g opacity="0.6">
    <circle cx="208" cy="186" r="62" fill="#FFFFFF"/>
    <circle cx="238" cy="166" r="56" fill="#FFF3E2"/>
  </g>

  <!-- sun glow + sun -->
  <circle cx="512" cy="612" r="520" fill="url(#glow)"/>
  <circle cx="512" cy="612" r="296" fill="url(#sun)"/>

  <!-- mist band grounding the sun -->
  <rect x="0" y="760" width="1024" height="264" fill="url(#mist)"/>

  <!-- bridge arc spanning the icon over the sun -->
  <path d="M96 800 Q 512 296 928 800" fill="none" stroke="#FFFFFF"
        stroke-width="30" stroke-linecap="round" opacity="0.92"/>

  <!-- data dots crossing the bridge (sleep-stage colors), with halos -->
  <g>
    <circle cx="324" cy="600" r="47" fill="#FFFFFF"/>
    <circle cx="324" cy="600" r="36" fill="#4FBCCE"/>
    <circle cx="512" cy="548" r="55" fill="#FFFFFF"/>
    <circle cx="512" cy="548" r="43" fill="#9F81F2"/>
    <circle cx="700" cy="600" r="47" fill="#FFFFFF"/>
    <circle cx="700" cy="600" r="36" fill="#5F74E8"/>
  </g>
</svg>
</body>
</html>
